<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img-wrapper {
            border: 1px solid rgb(164, 42, 62);
            position: relative;
            overflow: hidden;
            height: 300px;
            width: 300px;
        }

        .inner-img {
            width: 100%;
            height: 100%;
            transition: 2s;
            object-fit: cover;
        }

        .inner-img:hover {
            transform: scale(3);
        }

       
    </style>
</head>

<body>
    <div class="img-wrapper">
        <img src="img/img6.jfif" alt="" class="inner-img">
    </div>



</body>

</html>
