<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
         ul{
            width: 200px;
            padding: 20px;
            border-radius: 20px;
            list-style: none;
            font-weight: 900;
        }
        li{
            padding: 10px;
            border: 1px solid;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        li:nth-child(odd){
            background-color: rgb(178, 186, 186);
        }
         li:nth-child(even){
            background-color: rgb(162, 154, 164);
        }
        li:nth-child(5){
            background-color: aquamarine;
        }
        li:last-child{
           background-color: blueviolet;
        }
        
    </style>
</head>
<body>
    <ul>
    <li class="color1">item 1</li>
    <li class="color2">item 2</li>
    <li class="color1">item 3</li>
    <li class="color2">item 4</li>
    <li class="color1">item 5</li>
    <li class="color2">item 6</li>
    <li class="color1">item 7</li>
    <li class="color2">item 8</li>
</ul>
</body>
</html>
