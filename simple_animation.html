<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    div
    {
        width:150px;
        height: 150px;
        border-radius: 20px;
        background-color: antiquewhite;
        position: relative;
        animation:movingbox;
        animation-duration: 5s;
        animation-iteration-count:infinite;
        animation-delay: 2s;

    }
    @keyframes movingbox{
        0%{background-color: aquamarine; left: 0px; top: 0px;}
        25%{background-color: blueviolet; left: 300px; top: 0px;}
        50%{background-color: rgb(161, 174, 170); left: 300px; top: 300px;}
        75%{background-color: blue ; left: 300px; top: 300px;

        }
        100%{

            background-color: red; left: 0px;top: 0px;
        }

    }
</style>
<body>
    
    <div>

    </div>
</body>
</html>
